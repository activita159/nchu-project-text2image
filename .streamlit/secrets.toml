# Streamlit Secrets 設定範本
# 部署至 Streamlit Cloud 時，請在 App Settings > Secrets 中設定

# Google Imagen 4 API Key（選填，若不使用 Imagen 4 引擎可留空）
GOOGLE_API_KEY = "your-google-api-key-here"

# Stable Horde API Key（選填，免費註冊 https://stablehorde.net/register 可獲得）
# 若不填，會使用匿名金鑰 "0000000000"，但部分功能可能受限
STABLEHORDE_API_KEY = "your-stablehorde-key-here"
